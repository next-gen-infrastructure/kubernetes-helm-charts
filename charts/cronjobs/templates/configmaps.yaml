{{- $allVolumes := default (dict) .Values.volumes -}}
{{- range $key, $value := $allVolumes }}
{{- if $value.configMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" $ }}-{{ $key }}
  namespace: {{ $.Release.Namespace }}
  labels: {{ include "common.labels.standard" $ | nindent 4 }}
data:
{{- range $file, $content := $value.configMap }}
  {{ $file }}: |{{ include "common.tplvalues.render" (dict "value" $content "context" $) | nindent 4 }}
{{- end -}}
{{- end -}}
{{- end -}}

