name: Test Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  test:
    if: github.head_ref != 'release-please--branches--main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        with:
          fetch-depth: 0
        uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Set up kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
      - name: lint
        run: |
          for x in ./charts/*; do
            pushd $x
            helm dependency update .
            helm lint . \
              --set global.project=core \
              --set global.domain=example.com \
              --set global.serviceName=test \
              --set global.org=example \
              --set global.environment=test \
              --with-subcharts \
              --strict
            popd
          done
      - name: validate
        run: |
          for x in ./charts/*; do
            if grep -q "^type: library" $x/Chart.yaml; then continue; fi
            pushd $x
            helm template . \
              --debug \
              --generate-name \
              --namespace test \
              --dependency-update \
              --set global.project=core \
              --set global.domain=example.com \
              --set global.serviceName=test \
              --set global.org=example \
              --set global.environment=test \
              --values values.yaml \
              | kubeconform -strict -ignore-missing-schemas -summary
            popd
          done
      - name: examples
        run: |
          for x in ./charts/*/examples; do
            pushd $x
            ./test.sh
            popd
          done


